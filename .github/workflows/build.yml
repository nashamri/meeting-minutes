name: Build releases

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # --- Windows: single-file windowed .exe ------------------------------------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller

      - name: Vendor typst
        shell: bash
        run: ./scripts/fetch-typst.sh x86_64-pc-windows-msvc

      - name: Build
        run: uv run pyinstaller meeting-minutes.spec --clean --noconfirm

      - name: Verify artifact exists
        run: if not exist dist\meeting-minutes.exe (echo Build missing && exit /b 1)
        shell: cmd

      - uses: actions/upload-artifact@v4
        with:
          name: meeting-minutes-windows
          path: dist/meeting-minutes.exe
          if-no-files-found: error

  # --- macOS: .app bundle, signed ad-hoc, packaged into a .dmg ---------------
  # Apple has dropped Intel; GitHub's `macos-15-intel` is the last Intel
  # runner (slated for retirement in Fall 2027), so it's our final window
  # for shipping an Intel DMG. arm64 builds on macos-14.
  macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            arch: arm64
          - os: macos-15-intel
            arch: x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # macos-14 / macos-15-intel runners ship with Xcode (~30 GB) plus a few
      # iOS/CoreSimulator caches. We need none of it for a Python+typst bundle,
      # and the leftover space gets tight once hdiutil stages the DMG's
      # intermediate image. Free it up front; `|| true` keeps the step green
      # if a path drifts in a future image.
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /Applications/Xcode*.app || true
          sudo rm -rf ~/Library/Developer/CoreSimulator || true
          sudo rm -rf /Library/Developer/CoreSimulator || true
          sudo rm -rf ~/Library/Developer/Xcode || true
          df -h /

      - name: Set up uv + Python
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller

      - name: Vendor typst
        run: |
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            ./scripts/fetch-typst.sh aarch64-apple-darwin
          else
            ./scripts/fetch-typst.sh x86_64-apple-darwin
          fi

      - name: Build
        run: uv run pyinstaller meeting-minutes.spec --clean --noconfirm

      # Ad-hoc signing is mandatory on Apple Silicon for the binary to launch
      # at all, and harmless on Intel. Real notarization needs an Apple
      # Developer cert (out of scope here); users will still need to right-
      # click → Open the first time, or run `xattr -cr` to clear quarantine.
      - name: Ad-hoc codesign
        run: |
          codesign --force --deep --sign - "dist/Meeting Minutes.app"
          codesign --verify --verbose "dist/Meeting Minutes.app"

      # hdiutil's auto-sizing of the sparse intermediate image undercounts
      # what PyInstaller's onefile .app bundle actually needs (the embedded
      # archive inside the bootloader binary throws off its estimator), and
      # the volume fills before the copy finishes. Size it from the real
      # .app footprint with a 2× + 100 MB headroom, build an R/W image
      # first, then convert to compressed UDZO.
      - name: Build DMG
        run: |
          APP_SIZE_MB=$(du -sm "dist/Meeting Minutes.app" | cut -f1)
          DMG_SIZE_MB=$((APP_SIZE_MB * 2 + 100))
          echo ".app is ${APP_SIZE_MB} MB; sizing DMG at ${DMG_SIZE_MB} MB"
          hdiutil create -size ${DMG_SIZE_MB}m -fs HFS+ \
            -volname "Meeting Minutes" \
            -srcfolder "dist/Meeting Minutes.app" \
            -ov -format UDRW "dist/temp.dmg"
          hdiutil convert "dist/temp.dmg" -format UDZO -ov \
            -o "dist/meeting-minutes-${{ matrix.arch }}.dmg"
          rm "dist/temp.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: meeting-minutes-macos-${{ matrix.arch }}
          path: dist/meeting-minutes-${{ matrix.arch }}.dmg
          if-no-files-found: error

  # --- Linux: PyInstaller binary wrapped into an AppImage --------------------
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.14"

      # AppImage's runtime needs FUSE 2 to mount itself on launch; the
      # ubuntu-latest runner ships FUSE 3 by default.
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Install Python dependencies (with linux extra for PySide6)
        run: |
          uv sync --extra linux
          uv pip install pyinstaller

      - name: Vendor typst
        run: ./scripts/fetch-typst.sh x86_64-unknown-linux-musl

      - name: Build
        run: uv run pyinstaller meeting-minutes.spec --clean --noconfirm

      - name: Download appimagetool
        run: |
          curl -L -o appimagetool \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Build AppImage
        env:
          APPIMAGETOOL: ${{ github.workspace }}/appimagetool
        run: ./packaging/linux/build-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: meeting-minutes-linux
          path: dist/meeting-minutes-x86_64.AppImage
          if-no-files-found: error

  # --- Release: only on tag pushes, after all builds succeed -----------------
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [windows, macos, linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
